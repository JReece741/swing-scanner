name: Scheduled Scan

on:
  schedule:
    - cron: '35 13 * * 1-5'
    - cron: '35 14 * * 1-5'
    - cron: '5 20 * * 1-5'
    - cron: '5 21 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scan
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: node scripts/run-scan.js

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json public/data/latest.json
          git diff --quiet --cached || git commit -m "Update scan data [automated]"
          git push
